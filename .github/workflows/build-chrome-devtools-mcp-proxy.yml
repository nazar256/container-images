name: build chrome-devtools-mcp-proxy

on:
  push:
    branches:
      - master
    paths:
      - images/chrome-devtools-mcp-proxy/**
      - .github/workflows/build-chrome-devtools-mcp-proxy.yml
      - .github/workflows/_reusable-build-and-push.yml

jobs:
  smoke:
    runs-on: ubuntu-latest
    outputs:
      mcp_proxy_version: ${{ steps.resolve.outputs.mcp_proxy_version }}
      chrome_devtools_mcp_version: ${{ steps.resolve.outputs.chrome_devtools_mcp_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve build args
        id: resolve
        run: |
          mcp_proxy_version="6.5.1"
          chrome_devtools_mcp_version="1.0.1"
          echo "mcp_proxy_version=${mcp_proxy_version}" >> "$GITHUB_OUTPUT"
          echo "chrome_devtools_mcp_version=${chrome_devtools_mcp_version}" >> "$GITHUB_OUTPUT"

      - name: Build smoke image
        run: |
          docker build \
            -t local/chrome-devtools-mcp-proxy:smoke \
            --build-arg MCP_PROXY_VERSION=${{ steps.resolve.outputs.mcp_proxy_version }} \
            --build-arg CHROME_DEVTOOLS_MCP_VERSION=${{ steps.resolve.outputs.chrome_devtools_mcp_version }} \
            -f images/chrome-devtools-mcp-proxy/Dockerfile \
            images/chrome-devtools-mcp-proxy

      - name: Smoke check binaries and entrypoint
        run: |
          docker run --rm --entrypoint sh local/chrome-devtools-mcp-proxy:smoke -ceu '
            command -v node >/dev/null
            command -v npm >/dev/null
            command -v mcp-proxy >/dev/null
            command -v chrome-devtools-mcp >/dev/null
            test -x /usr/local/bin/docker-entrypoint.sh
          '
          docker run --rm --entrypoint mcp-proxy local/chrome-devtools-mcp-proxy:smoke --help >/dev/null
          docker run --rm --entrypoint chrome-devtools-mcp local/chrome-devtools-mcp-proxy:smoke --help >/dev/null

      - name: Smoke check entrypoint validation and runtime process model
        run: |
          set -euo pipefail

          mkdir -p .tmp

          cat > .tmp/chrome-devtools-mcp-proxy-initialize.json <<'EOF'
          {"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"smoke-client","version":"1.0.0"}}}
          EOF

          if docker run --rm local/chrome-devtools-mcp-proxy:smoke >.tmp/chrome-devtools-mcp-proxy-missing-token.log 2>&1; then
            echo "expected missing-token startup failure" >&2
            exit 1
          fi
          grep -q 'BROWSER_CDP_BEARER_TOKEN' .tmp/chrome-devtools-mcp-proxy-missing-token.log

          if docker run --rm \
            -e BROWSER_CDP_BEARER_TOKEN=dummy-browser-cdp-token \
            local/chrome-devtools-mcp-proxy:smoke >.tmp/chrome-devtools-mcp-proxy-missing-api-key.log 2>&1; then
            echo "expected missing-api-key startup failure" >&2
            exit 1
          fi
          grep -q 'MCP_PROXY_API_KEY' .tmp/chrome-devtools-mcp-proxy-missing-api-key.log

          if docker run --rm \
            -e BROWSER_CDP_BEARER_TOKEN=dummy-browser-cdp-token \
            -e MCP_PROXY_API_KEY=dummy-incoming-api-key \
            -e CHROME_DEVTOOLS_MCP_EXTRA_ARGS='not-json' \
            local/chrome-devtools-mcp-proxy:smoke >.tmp/chrome-devtools-mcp-proxy-invalid-extra-args.log 2>&1; then
            echo "expected invalid-extra-args startup failure" >&2
            exit 1
          fi
          grep -q 'CHROME_DEVTOOLS_MCP_EXTRA_ARGS must be a JSON array of strings.' .tmp/chrome-devtools-mcp-proxy-invalid-extra-args.log

          if docker run --rm \
            -e BROWSER_CDP_BEARER_TOKEN=dummy-browser-cdp-token \
            -e MCP_PROXY_API_KEY=dummy-incoming-api-key \
            -e CHROME_DEVTOOLS_MCP_EXTRA_ARGS='["--wsEndpoint=ws://override"]' \
            local/chrome-devtools-mcp-proxy:smoke >.tmp/chrome-devtools-mcp-proxy-forbidden-ws-endpoint.log 2>&1; then
            echo "expected forbidden-ws-endpoint startup failure" >&2
            exit 1
          fi
          grep -q 'CHROME_DEVTOOLS_MCP_EXTRA_ARGS may not override required browser connection or telemetry flags: --wsEndpoint=ws://override' .tmp/chrome-devtools-mcp-proxy-forbidden-ws-endpoint.log

          if docker run --rm \
            -e BROWSER_CDP_BEARER_TOKEN=dummy-browser-cdp-token \
            -e MCP_PROXY_API_KEY=dummy-incoming-api-key \
            -e CHROME_DEVTOOLS_MCP_EXTRA_ARGS='["--browser-url=http://override"]' \
            local/chrome-devtools-mcp-proxy:smoke >.tmp/chrome-devtools-mcp-proxy-forbidden-browser-url.log 2>&1; then
            echo "expected forbidden-browser-url startup failure" >&2
            exit 1
          fi
          grep -q 'CHROME_DEVTOOLS_MCP_EXTRA_ARGS may not override required browser connection or telemetry flags: --browser-url=http://override' .tmp/chrome-devtools-mcp-proxy-forbidden-browser-url.log

          if docker run --rm \
            -e BROWSER_CDP_BEARER_TOKEN=dummy-browser-cdp-token \
            -e MCP_PROXY_API_KEY=dummy-incoming-api-key \
            -e CHROME_DEVTOOLS_MCP_EXTRA_ARGS='["--browserUrl=http://override"]' \
            local/chrome-devtools-mcp-proxy:smoke >.tmp/chrome-devtools-mcp-proxy-forbidden-browserUrl.log 2>&1; then
            echo "expected forbidden-browserUrl startup failure" >&2
            exit 1
          fi
          grep -q 'CHROME_DEVTOOLS_MCP_EXTRA_ARGS may not override required browser connection or telemetry flags: --browserUrl=http://override' .tmp/chrome-devtools-mcp-proxy-forbidden-browserUrl.log

          unauthenticated_container_id="$(docker run -d \
            -e BROWSER_CDP_BEARER_TOKEN=dummy-browser-cdp-token \
            -e MCP_PROXY_ALLOW_UNAUTHENTICATED=true \
            -e CHROME_DEVTOOLS_MCP_EXTRA_ARGS='["--headless"]' \
            -e BROWSER_CDP_WS_ENDPOINT=ws://127.0.0.1:9/devtools/browser \
            local/chrome-devtools-mcp-proxy:smoke)"

          trap 'docker rm -f "$unauthenticated_container_id" "$container_id" "$api_key_container_id" >/dev/null 2>&1 || true' EXIT

          docker exec "$unauthenticated_container_id" sh -ceu '
            for i in $(seq 1 50); do
              curl -fsS http://127.0.0.1:8000/ping >/dev/null 2>/dev/null && exit 0
              sleep 0.2
            done
            exit 1
          '

          docker logs "$unauthenticated_container_id" > .tmp/chrome-devtools-mcp-proxy-unauthenticated.log 2>&1
          grep -q 'WARNING: Starting without MCP_PROXY_API_KEY because MCP_PROXY_ALLOW_UNAUTHENTICATED=true.' .tmp/chrome-devtools-mcp-proxy-unauthenticated.log
          docker exec "$unauthenticated_container_id" sh -ceu '
            ps -eo args= | grep -Eq "(^|/)chrome-devtools-mcp( |$).+ --headless( |$)"
          '
          docker rm -f "$unauthenticated_container_id" >/dev/null
          unset unauthenticated_container_id

          mkdir -p .tmp/chrome-devtools-mcp-proxy-smoke
          tmpdir=".tmp/chrome-devtools-mcp-proxy-smoke"
          tmpdir_abs="$PWD/$tmpdir"
          printf '%s\n' 'dummy-browser-cdp-token' > "$tmpdir/browser_cdp_token"

          container_id="$(docker run -d \
            -v "$tmpdir_abs:/run/secrets:ro" \
            -e BROWSER_CDP_BEARER_TOKEN_FILE=/run/secrets/browser_cdp_token \
            -e MCP_PROXY_ALLOW_UNAUTHENTICATED=true \
            -e BROWSER_CDP_WS_ENDPOINT=ws://127.0.0.1:9/devtools/browser \
            local/chrome-devtools-mcp-proxy:smoke)"

          docker exec "$container_id" sh -ceu '
            for i in $(seq 1 50); do
              curl -fsS http://127.0.0.1:8000/ping >/dev/null 2>/dev/null && exit 0
              sleep 0.2
            done
            exit 1
          '

          docker exec "$container_id" sh -ceu '
            for i in $(seq 1 3); do
              status="$(curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/mcp || true)"
              test "$status" = 400
            done
            test "$(curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/sse || true)" = 404
          '

          printf '%s\n' 'dummy-incoming-api-key' > "$tmpdir/mcp_proxy_api_key"
          api_key_container_id="$(docker run -d \
            -v "$tmpdir_abs:/run/secrets:ro" \
            -e BROWSER_CDP_BEARER_TOKEN_FILE=/run/secrets/browser_cdp_token \
            -e MCP_PROXY_API_KEY_FILE=/run/secrets/mcp_proxy_api_key \
            -e BROWSER_CDP_WS_ENDPOINT=ws://127.0.0.1:9/devtools/browser \
            local/chrome-devtools-mcp-proxy:smoke)"

          docker exec "$api_key_container_id" sh -ceu '
            for i in $(seq 1 50); do
              curl -fsS http://127.0.0.1:8000/ping >/dev/null 2>/dev/null && exit 0
              sleep 0.2
            done
            exit 1
          '

          docker exec "$api_key_container_id" sh -ceu '
            test "$(curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/mcp || true)" = 401
            test "$(curl -sS -H "X-API-Key: dummy-incoming-api-key" -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/mcp || true)" = 400
          '

          docker cp .tmp/chrome-devtools-mcp-proxy-initialize.json "$api_key_container_id:/tmp/initialize.json"
          docker exec "$api_key_container_id" sh -ceu '
            curl -i -sS -X POST http://127.0.0.1:8000/mcp \
              -H "X-API-Key: dummy-incoming-api-key" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json, text/event-stream" \
              --data-binary @/tmp/initialize.json \
              > /tmp/initialize-response.txt

            if ! grep -qE "^HTTP/[^ ]+ 200" /tmp/initialize-response.txt; then
              echo "initialize response missing 200 HTTP status line" >&2
              cat /tmp/initialize-response.txt >&2 || true
              exit 1
            fi

            if ! grep -qi "mcp-session-id:" /tmp/initialize-response.txt; then
              echo "initialize response missing mcp-session-id header" >&2
              cat /tmp/initialize-response.txt >&2 || true
              exit 1
            fi

            if ! grep -q "\"jsonrpc\":\"2.0\"" /tmp/initialize-response.txt; then
              echo "initialize response missing jsonrpc marker" >&2
              cat /tmp/initialize-response.txt >&2 || true
              exit 1
            fi

            if ! grep -q "\"id\":1" /tmp/initialize-response.txt; then
              echo "initialize response missing id marker" >&2
              cat /tmp/initialize-response.txt >&2 || true
              exit 1
            fi

            if ! grep -q "\"name\":\"chrome_devtools\"" /tmp/initialize-response.txt; then
              echo "initialize response missing server name marker" >&2
              cat /tmp/initialize-response.txt >&2 || true
              exit 1
            fi
          '

          docker exec "$api_key_container_id" sh -ceu '
            test "$(ps -eo args= | grep -Ec "(^|/)(mcp-proxy)( |$)")" -eq 1
            test "$(ps -eo args= | grep -Ec "(^|/)(chrome-devtools-mcp)( |$)")" -eq 1
            ps -eo args= | grep -Eq "(^|/)mcp-proxy( |$).+ -- chrome-devtools-mcp "
          '

  build:
    needs: smoke
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_reusable-build-and-push.yml
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    with:
      image_name: chrome-devtools-mcp-proxy
      context: images/chrome-devtools-mcp-proxy
      dockerfile: images/chrome-devtools-mcp-proxy/Dockerfile
      build_args: |
        MCP_PROXY_VERSION=${{ needs.smoke.outputs.mcp_proxy_version }}
        CHROME_DEVTOOLS_MCP_VERSION=${{ needs.smoke.outputs.chrome_devtools_mcp_version }}
