name: build openclaw-browser-node

on:
  push:
    branches:
      - master
    paths:
      - images/openclaw-browser-node/**
      - .github/workflows/build-openclaw-browser-node.yml
      - .github/workflows/_reusable-build-and-push.yml

jobs:
  smoke:
    runs-on: ubuntu-latest
    outputs:
      openclaw_version: ${{ steps.resolve.outputs.openclaw_version }}
      node_version: ${{ steps.resolve.outputs.node_version }}
      chromium_version: ${{ steps.resolve.outputs.chromium_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve build args
        id: resolve
        run: |
          openclaw_version="2026.4.9"
          node_version="22.14.0"
          chromium_version="version-09bef544"
          echo "openclaw_version=${openclaw_version}" >> "$GITHUB_OUTPUT"
          echo "node_version=${node_version}" >> "$GITHUB_OUTPUT"
          echo "chromium_version=${chromium_version}" >> "$GITHUB_OUTPUT"

      - name: Build smoke image
        run: |
          docker build \
            -t local/openclaw-browser-node:smoke \
            --build-arg NODE_VERSION=${{ steps.resolve.outputs.node_version }} \
            --build-arg OPENCLAW_VERSION=${{ steps.resolve.outputs.openclaw_version }} \
            --build-arg CHROMIUM_VERSION=${{ steps.resolve.outputs.chromium_version }} \
            -f images/openclaw-browser-node/Dockerfile \
            images/openclaw-browser-node

      - name: Smoke check OpenClaw install and service assets
        run: |
          docker run --rm --entrypoint openclaw local/openclaw-browser-node:smoke --version >/dev/null
          docker run --rm --entrypoint chrome-devtools-mcp local/openclaw-browser-node:smoke --version >/dev/null
          docker run --rm --entrypoint sh local/openclaw-browser-node:smoke -ceu 'test -x /custom-cont-init.d/40-openclaw-init'
          docker run --rm --entrypoint sh local/openclaw-browser-node:smoke -ceu 'test -x /custom-services.d/openclaw-node/run'
          docker run --rm --entrypoint sh local/openclaw-browser-node:smoke -ceu 'test -x /custom-services.d/openclaw-devtools-mcp/run'
          docker run --rm --entrypoint sh local/openclaw-browser-node:smoke -ceu 'test -f /usr/local/lib/openclaw-devtools-mcp/index.mjs'
          docker run --rm --entrypoint sh local/openclaw-browser-node:smoke -ceu 'test -x /usr/bin/chromium'
          docker run --rm --entrypoint sh local/openclaw-browser-node:smoke -ceu 'test -x /usr/bin/chromium-browser'
          docker run --rm --entrypoint bash local/openclaw-browser-node:smoke -ceu 'source /custom-cont-init.d/40-openclaw-init; [[ "$${CHROME_CLI}" == *"--remote-debugging-address=0.0.0.0"* ]]; [[ "$${CHROME_CLI}" == *"--remote-debugging-port=$${CDP_PORT}"* ]]; [[ "$${OPENCLAW_BROWSER_CDP_URL}" == "http://127.0.0.1:$${CDP_PORT}" ]]'

  build:
    needs: smoke
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_reusable-build-and-push.yml
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    with:
      image_name: openclaw-browser-node
      context: images/openclaw-browser-node
      dockerfile: images/openclaw-browser-node/Dockerfile
      build_args: |
        NODE_VERSION=${{ needs.smoke.outputs.node_version }}
        OPENCLAW_VERSION=${{ needs.smoke.outputs.openclaw_version }}
        CHROMIUM_VERSION=${{ needs.smoke.outputs.chromium_version }}
