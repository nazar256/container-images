name: build example

on:
  push:
    branches:
      - master
    paths:
      - images/example/**
      - .github/workflows/build-example.yml
      - .github/workflows/_reusable-build-and-push.yml

jobs:
  build:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/_reusable-build-and-push.yml
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    with:
      image_name: example
      context: images/example
      dockerfile: images/example/Dockerfile
